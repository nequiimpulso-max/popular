<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Menú Comida Colombiana | Sitio Informativo</title>

<meta name="description" content="Menú informativo de comida popular colombiana. Conoce platos típicos y tradicionales.">

<style>

/* RESET */
html, body{
  margin:0;
  padding:0;
  width:100%;
  overflow-x:hidden;
  font-family:'Inter',system-ui,Arial,sans-serif;
  background:#050b0f;
  color:#e6fff4;
}

/* HEADER */
header{
  position:sticky;
  top:0;
  z-index:99;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:14px 20px;
  background:rgba(0,255,153,.12);
  backdrop-filter:blur(14px);
  border-bottom:1px solid rgba(0,255,153,.25);
}

header .left{
  display:flex;
  align-items:center;
  gap:12px;
}

header .icon{
  font-size:24px;
  cursor:pointer;
  color:#00ff99;
}

header .title{
  font-size:20px;
  font-weight:600;
}

/* CONTENEDOR */
.container{
  padding:24px 18px 40px;
  max-width:720px;
  margin:auto;
}

.titulo{
  font-size:30px;
  font-weight:600;
  margin-bottom:24px;
  color:#00ff99;
  text-align:center;
}

/* CATEGORÍA */
.categoria{
  margin-top:20px;
  margin-bottom:18px;
  font-size:22px;
  font-weight:600;
  color:#7affc9;
  border-left:4px solid #00ff99;
  padding-left:10px;
}

/* ITEMS */
.item{
  padding:16px 18px;
  margin-bottom:14px;
  background:linear-gradient(135deg,rgba(0,255,153,.12),rgba(0,255,153,.05));
  border-radius:14px;
  border:1px solid rgba(0,255,153,.25);
  box-shadow:0 0 18px rgba(0,255,153,.15);
  transition:.2s;
}

.item:hover{
  transform:translateY(-2px);
}

.nombre{
  font-size:17px;
}

/* FOOTER */
footer{
  padding:26px 20px;
  border-top:1px solid rgba(0,255,153,.25);
}

footer button{
  width:100%;
  padding:16px;
  font-size:18px;
  font-weight:700;
  border-radius:14px;
  border:none;
  background:linear-gradient(135deg,#00ff99,#00cc77);
  color:#022015;
  cursor:pointer;
}

/* RESPONSIVE */
@media(max-width:480px){
  .titulo{font-size:26px}
  .categoria{font-size:19px}
}

</style>
</head>

<body>

<!-- HEADER -->
<header>
  <div class="left">
    <span class="icon" onclick="history.back()">&#8592;</span>
    <span class="title">Menú</span>
  </div>
</header>

<!-- CONTENIDO -->
<div class="container">

  <h1 class="titulo">Menú Colombiano</h1>

  <!-- DESAYUNOS -->
  <div class="categoria">Desayunos</div>
  <div class="item"><span class="nombre">Calentado con huevo</span></div>
  <div class="item"><span class="nombre">Arepa con queso</span></div>
  <div class="item"><span class="nombre">Huevos pericos</span></div>
  <div class="item"><span class="nombre">Chocolate caliente</span></div>
  <div class="item"><span class="nombre">Café con leche</span></div>

  <!-- ALMUERZOS -->
  <div class="categoria">Almuerzos</div>
  <div class="item"><span class="nombre">Bandeja paisa</span></div>
  <div class="item"><span class="nombre">Sancocho</span></div>
  <div class="item"><span class="nombre">Ajiaco</span></div>
  <div class="item"><span class="nombre">Arroz con pollo</span></div>
  <div class="item"><span class="nombre">Carne asada con yuca</span></div>

  <!-- COMIDA RÁPIDA -->
  <div class="categoria">Comida rápida</div>
  <div class="item"><span class="nombre">Empanadas</span></div>
  <div class="item"><span class="nombre">Arepa rellena</span></div>
  <div class="item"><span class="nombre">Papa rellena</span></div>

  <!-- BEBIDAS -->
  <div class="categoria">Bebidas</div>
  <div class="item"><span class="nombre">Jugo natural</span></div>
  <div class="item"><span class="nombre">Aguapanela</span></div>
  <div class="item"><span class="nombre">Limonada</span></div>

</div>

<!-- FOOTER -->
<footer>
  <button onclick="window.location.href='index.html'">
    Volver al inicio
  </button>
</footer>

</body>
</html>
